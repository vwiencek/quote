<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft or Hard Picker</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --soft: #38bdf8;
    --hard: #f472b6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: var(--card);
    border-radius: 1rem;
    padding: 2.5rem 2rem;
    max-width: 26rem;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
  }
  h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
  .buttons { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; }
  button {
    flex: 1;
    padding: 0.9rem 1rem;
    font-size: 1.1rem;
    font-weight: 600;
    border: none;
    border-radius: 0.6rem;
    cursor: pointer;
    color: #0f172a;
    transition: transform .1s ease, filter .15s ease;
  }
  button:hover { filter: brightness(1.15); }
  button:active { transform: scale(.96); }
  #btn-soft { background: var(--soft); }
  #btn-hard { background: var(--hard); }
  #result {
    min-height: 5.5rem;
    display: none;
    flex-direction: column;
    gap: 0.5rem;
  }
  #result.visible { display: flex; }
  #item { font-size: 1.5rem; font-weight: 700; }
  #time { font-size: 1.1rem; color: var(--muted); }
  .badge {
    align-self: center;
    font-size: .75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    padding: .25rem .7rem;
    border-radius: 999px;
    color: #0f172a;
  }
  .badge.soft { background: var(--soft); }
  .badge.hard { background: var(--hard); }
</style>
</head>
<body>
  <div class="card">
    <h1>Pick your mode</h1>
    <div class="buttons">
      <button id="btn-soft">Soft</button>
      <button id="btn-hard">Hard</button>
    </div>
    <div id="result">
      <span class="badge" id="badge"></span>
      <div id="item"></div>
      <div id="time"></div>
    </div>
  </div>

<script>
  // ======================================================
  // EDIT YOUR LISTS HERE — Map<key, list>
  // ======================================================
  const activities = new Map([
    ["soft", [
      "Stretching",
      "Deep breathing",
      "Slow walk",
      "Foam rolling",
      "Meditation",
    ]],
    ["hard", [
      "Burpees",
      "Push-ups",
      "Squats",
      "Plank",
      "Jumping jacks",
    ]],
  ]);
  // ======================================================

  const MIN_MINUTES = 2;
  const MAX_MINUTES = 10;

  function pick(key) {
    const list = activities.get(key);
    const item = list[Math.floor(Math.random() * list.length)];
    const minutes = MIN_MINUTES + Math.floor(Math.random() * (MAX_MINUTES - MIN_MINUTES + 1));

    const badge = document.getElementById("badge");
    badge.textContent = key;
    badge.className = "badge " + key;
    document.getElementById("item").textContent = item;
    document.getElementById("time").textContent = "for " + minutes + " minute" + (minutes > 1 ? "s" : "");
    document.getElementById("result").classList.add("visible");
  }

  document.getElementById("btn-soft").addEventListener("click", () => pick("soft"));
  document.getElementById("btn-hard").addEventListener("click", () => pick("hard"));
</script>
</body>
</html>
