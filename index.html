<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft or Hard Picker</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --soft: #38bdf8;
    --hard: #f472b6;
    --done: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: var(--card);
    border-radius: 1rem;
    padding: 2.5rem 2rem;
    max-width: 26rem;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
  }
  h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
  .buttons { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; }
  button {
    flex: 1;
    padding: 0.9rem 1rem;
    font-size: 1.1rem;
    font-weight: 600;
    border: none;
    border-radius: 0.6rem;
    cursor: pointer;
    color: #0f172a;
    transition: transform .1s ease, filter .15s ease;
  }
  button:hover { filter: brightness(1.15); }
  button:active { transform: scale(.96); }
  button:disabled { filter: grayscale(.6); cursor: not-allowed; }
  #btn-soft { background: var(--soft); }
  #btn-hard { background: var(--hard); }
  #result {
    display: none;
    flex-direction: column;
    gap: 0.75rem;
  }
  #result.visible { display: flex; }
  #item { font-size: 1.15rem; font-weight: 700; line-height: 1.4; }
  .timer-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
  }
  #countdown {
    font-size: 3rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  #countdown.done { color: var(--done); }
  #btn-plus {
    flex: none;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.4rem 0.7rem;
    border-radius: 0.5rem;
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--text);
  }
  #btn-plus:hover { border-color: var(--text); filter: none; }
  #status { color: var(--muted); font-size: 1rem; }
  .badge {
    align-self: center;
    font-size: .75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    padding: .25rem .7rem;
    border-radius: 999px;
    color: #0f172a;
  }
  .badge.soft { background: var(--soft); }
  .badge.hard { background: var(--hard); }
  #error { color: #f87171; display: none; }
</style>
</head>
<body>
  <div class="card">
    <h1>Pick your mode</h1>
    <div class="buttons">
      <button id="btn-soft">Soft</button>
      <button id="btn-hard">Hard</button>
    </div>
    <p id="error"></p>
    <div id="result">
      <span class="badge" id="badge"></span>
      <div id="item"></div>
      <div class="timer-row">
        <div id="countdown"></div>
        <button id="btn-plus" title="Add one minute">+ 1 min</button>
      </div>
      <div id="status"></div>
    </div>
  </div>

<script>
  // Data comes from a Google Sheet shared as "anyone with the link can view".
  // Two formats are supported:
  //   - row-based: columns "gage" (text) and "type" (soft/hard), one entry per row
  //   - column-based: one "soft" column and one "hard" column
  // quotes.json is the fallback when the sheet is unreachable.
  const SHEET_ID = "1wRKkiy9z9AjNeNns6jI5iRtYi6_SWLlvO3NfWknuJYI";
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:csv";
  const FALLBACK_URL = "quotes.json";
  const MIN_MINUTES = 2;
  const MAX_MINUTES = 10;

  let activities = null;
  let timerId = null;
  let remaining = 0;

  const badge = document.getElementById("badge");
  const itemEl = document.getElementById("item");
  const countdownEl = document.getElementById("countdown");
  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");
  const errorEl = document.getElementById("error");
  const btnSoft = document.getElementById("btn-soft");
  const btnHard = document.getElementById("btn-hard");
  const btnPlus = document.getElementById("btn-plus");

  function parseCsv(text) {
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i++; }
          else inQuotes = false;
        } else field += c;
      } else if (c === '"') inQuotes = true;
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
      else if (c !== "\r") field += c;
    }
    if (field !== "" || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  function csvToActivities(text) {
    const rows = parseCsv(text);
    const headers = rows[0].map(h => h.trim().toLowerCase());
    const typeIdx = headers.indexOf("type");
    const data = {};

    if (typeIdx !== -1) {
      // Row-based format: a text column + a "type" column (soft/hard).
      const textIdx = headers.findIndex((h, i) => h && i !== typeIdx);
      for (const r of rows.slice(1)) {
        const value = (r[textIdx] || "").trim();
        const key = (r[typeIdx] || "").trim().toLowerCase();
        if (!value || !key) continue;
        (data[key] = data[key] || []).push(value);
      }
    } else {
      // Column-based format: one column per key.
      headers.forEach(h => { if (h) data[h] = []; });
      for (const r of rows.slice(1)) {
        r.forEach((value, i) => {
          const key = headers[i];
          if (key && value && value.trim()) data[key].push(value.trim());
        });
      }
    }
    return data;
  }

  function isValid(data) {
    return data && Array.isArray(data.soft) && data.soft.length > 0 &&
           Array.isArray(data.hard) && data.hard.length > 0;
  }

  async function loadData() {
    try {
      const res = await fetch(SHEET_CSV_URL);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = csvToActivities(await res.text());
      if (!isValid(data)) throw new Error("missing soft/hard columns");
      activities = data;
      console.info("Activities loaded from Google Sheet");
      return;
    } catch (err) {
      console.warn("Google Sheet unavailable (" + err.message + "), falling back to " + FALLBACK_URL);
    }
    try {
      const res = await fetch(FALLBACK_URL);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (!isValid(data)) throw new Error("missing soft/hard keys");
      activities = data;
      console.info("Activities loaded from fallback " + FALLBACK_URL);
    } catch (err) {
      btnSoft.disabled = true;
      btnHard.disabled = true;
      errorEl.textContent = "Could not load activities from the Google Sheet nor " +
        FALLBACK_URL + " (" + err.message + "). " +
        "Serve the site over HTTP (./serve.sh) — fetch does not work from file://";
      errorEl.style.display = "block";
    }
  }

  function formatTime(totalSeconds) {
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;
    return m + ":" + String(s).padStart(2, "0");
  }

  function tick() {
    remaining--;
    countdownEl.textContent = formatTime(Math.max(remaining, 0));
    if (remaining <= 0) {
      clearInterval(timerId);
      timerId = null;
      countdownEl.classList.add("done");
      statusEl.textContent = "Time's up! Well done 🎉";
    }
  }

  function startTimer() {
    clearInterval(timerId);
    timerId = setInterval(tick, 1000);
  }

  function pick(key) {
    if (!activities) return;
    const list = activities[key];
    const item = list[Math.floor(Math.random() * list.length)];
    const minutes = MIN_MINUTES + Math.floor(Math.random() * (MAX_MINUTES - MIN_MINUTES + 1));
    remaining = minutes * 60;

    badge.textContent = key;
    badge.className = "badge " + key;
    itemEl.textContent = item;
    countdownEl.classList.remove("done");
    countdownEl.textContent = formatTime(remaining);
    statusEl.textContent = minutes + " minute" + (minutes > 1 ? "s" : "") + " — go!";
    resultEl.classList.add("visible");

    startTimer();
  }

  function addMinute() {
    if (!resultEl.classList.contains("visible")) return;
    remaining += 60;
    countdownEl.classList.remove("done");
    countdownEl.textContent = formatTime(remaining);
    if (!timerId) {
      statusEl.textContent = "One more minute — go!";
      startTimer();
    }
  }

  btnSoft.addEventListener("click", () => pick("soft"));
  btnHard.addEventListener("click", () => pick("hard"));
  btnPlus.addEventListener("click", addMinute);
  loadData();
</script>
</body>
</html>
