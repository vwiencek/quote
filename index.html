<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Quote</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f6f4ef;
      --card: #ffffff;
      --text: #1f2430;
      --muted: #6b7280;
      --accent: #4f6df5;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14161c;
        --card: #1e222c;
        --text: #e8eaf0;
        --muted: #9aa1af;
        --accent: #7c93ff;
      }
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: var(--card);
      max-width: 40rem;
      width: 100%;
      padding: 3rem 2.5rem;
      border-radius: 1rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    blockquote {
      font-size: 1.5rem;
      line-height: 1.5;
      font-style: italic;
      margin-bottom: 1.5rem;
    }

    blockquote::before { content: "\201C"; }
    blockquote::after  { content: "\201D"; }

    cite {
      display: block;
      font-style: normal;
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }

    cite::before { content: "\2014\00A0"; }

    button {
      font-family: inherit;
      font-size: 1rem;
      padding: 0.75rem 1.75rem;
      border: none;
      border-radius: 0.5rem;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <main class="card">
    <blockquote id="quote"></blockquote>
    <cite id="author"></cite>
    <button id="new-quote">New quote</button>
  </main>

  <script>
    const quotes = [
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "Life is what happens when you're busy making other plans.", author: "John Lennon" },
      { text: "In the middle of difficulty lies opportunity.", author: "Albert Einstein" },
      { text: "It is not the strongest of the species that survives, but the most adaptable.", author: "Charles Darwin" },
      { text: "Simplicity is the ultimate sophistication.", author: "Leonardo da Vinci" },
      { text: "Whether you think you can or you think you can't, you're right.", author: "Henry Ford" },
      { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese proverb" },
      { text: "Do not go where the path may lead, go instead where there is no path and leave a trail.", author: "Ralph Waldo Emerson" },
      { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
      { text: "The journey of a thousand miles begins with a single step.", author: "Lao Tzu" },
    ];

    const quoteEl = document.getElementById("quote");
    const authorEl = document.getElementById("author");
    let currentIndex = -1;

    function showRandomQuote() {
      let index;
      do {
        index = Math.floor(Math.random() * quotes.length);
      } while (index === currentIndex && quotes.length > 1);
      currentIndex = index;
      quoteEl.textContent = quotes[index].text;
      authorEl.textContent = quotes[index].author;
    }

    document.getElementById("new-quote").addEventListener("click", showRandomQuote);
    showRandomQuote();
  </script>
</body>
</html>
