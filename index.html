<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Donne-moi un gage</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="stylesheet" href="styles.css">
</head>
<body class="locked">
  <div id="lock" class="lock">
    <div class="lock-card">
      <div class="lock-icon" aria-hidden="true">🔒</div>
      <p class="lock-title">Code d'accès</p>
      <div id="pin-dots" class="pin-dots" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>
      <p id="pin-error" class="pin-error">Code incorrect</p>
      <div class="keypad" role="group" aria-label="Clavier">
        <button class="key" data-key="1">1</button>
        <button class="key" data-key="2">2</button>
        <button class="key" data-key="3">3</button>
        <button class="key" data-key="4">4</button>
        <button class="key" data-key="5">5</button>
        <button class="key" data-key="6">6</button>
        <button class="key" data-key="7">7</button>
        <button class="key" data-key="8">8</button>
        <button class="key" data-key="9">9</button>
        <span></span>
        <button class="key" data-key="0">0</button>
        <button class="key key-del" data-key="del" aria-label="Effacer">⌫</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="player-row">
      <span class="player-label">Donne un gage à ...</span>
      <div class="player-controls">
      <div class="player-toggle" role="group" aria-label="Joueur">
        <button id="player-homme" class="ptoggle" aria-pressed="false" aria-label="un homme" title="un homme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="9.5" cy="14.5" r="6"/>
            <path d="M14 10 L21 3 M15.5 3 H21 V8.5"/>
          </svg>
        </button>
        <button id="player-femme" class="ptoggle" aria-pressed="false" aria-label="une femme" title="une femme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="8.5" r="6"/>
            <path d="M12 14.5 V22 M8.5 18.5 H15.5"/>
          </svg>
        </button>
      </div>
      <button id="btn-alternate" class="alt-toggle" aria-pressed="false" title="Alterner automatiquement le joueur à chaque gage">🔁 chacun son tour</button>
      </div>
    </div>
    <div class="options" role="group" aria-label="Options">
      <button id="btn-intensity" class="opt" aria-pressed="false" title="Tirages de plus en plus hard au fil de la soirée">🔥 intensité</button>
      <button id="btn-hidden" class="opt" aria-pressed="false" title="Masquer le temps restant">🙈 temps caché</button>
      <button id="btn-sound" class="opt" aria-pressed="true" title="Activer ou couper le son">🔊 son</button>
    </div>
    <div id="keywords" class="keywords" role="group" aria-label="Filtres"></div>
    <div class="buttons">
      <button id="btn-soft">Soft</button>
      <button id="btn-surprise" title="Soft ou hard, au hasard">Surprise</button>
      <button id="btn-hard">Hard</button>
    </div>
    <p id="error"></p>
    <p id="note"></p>
    <div id="result">
      <span class="badge" id="badge"></span>
      <div id="item"></div>
      <div class="timer-row">
        <div class="ring-wrap" id="ring-wrap">
          <svg viewBox="0 0 120 120" aria-hidden="true">
            <circle class="ring-bg" cx="60" cy="60" r="54"/>
            <circle class="ring-fg" id="ring" cx="60" cy="60" r="54"/>
          </svg>
          <div id="countdown"></div>
        </div>
        <button id="btn-pause" title="Pause / reprendre" aria-label="Pause ou reprendre le minuteur">⏸</button>
        <button id="btn-plus" title="Ajouter une minute" aria-label="Ajouter une minute">+ 1 min</button>
      </div>
      <button id="btn-finish" title="Le gage est fait — arrêter le minuteur">Terminé ✔</button>
      <div id="status"></div>
    </div>
    <div id="score-row">
      Score&nbsp;: <span class="score-man">Lui <b id="score-homme">0</b></span>
      <span class="score-sep">—</span>
      <span class="score-woman">Elle <b id="score-femme">0</b></span>
      <button id="btn-reset-score" title="Remettre le score à zéro">↺</button>
    </div>
  </div>
  <div id="zoom" role="button" title="Réduire"></div>

<script src="app.js"></script>
</body>
</html>
