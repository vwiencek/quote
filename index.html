<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0e18">
<title>Donne-moi un gage</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="stylesheet" href="styles.css">
</head>
<body class="locked">
  <div id="lock" class="lock">
    <div class="lock-card">
      <div class="lock-icon" aria-hidden="true">🔒</div>
      <p class="lock-title">Code d'accès</p>
      <div id="pin-dots" class="pin-dots" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>
      <p id="pin-error" class="pin-error" role="alert">Code incorrect</p>
      <div class="keypad" role="group" aria-label="Clavier">
        <button class="key" data-key="1">1</button>
        <button class="key" data-key="2">2</button>
        <button class="key" data-key="3">3</button>
        <button class="key" data-key="4">4</button>
        <button class="key" data-key="5">5</button>
        <button class="key" data-key="6">6</button>
        <button class="key" data-key="7">7</button>
        <button class="key" data-key="8">8</button>
        <button class="key" data-key="9">9</button>
        <span></span>
        <button class="key" data-key="0">0</button>
        <button class="key key-del" data-key="del" aria-label="Effacer">⌫</button>
      </div>
    </div>
  </div>

  <div class="card">
    <!-- Header + joueur -->
    <div class="header">
      <div class="eyebrow">Donne un gage à…</div>
      <div class="player-toggle" role="group" aria-label="Joueur">
        <button id="player-homme" class="ptoggle" aria-pressed="false" aria-label="Lui">&#9794;&#65038;&nbsp;Lui</button>
        <button id="player-femme" class="ptoggle" aria-pressed="false" aria-label="Elle">&#9792;&#65038;&nbsp;Elle</button>
      </div>
      <div id="turn-label" class="turn-label"></div>
    </div>

    <!-- Options -->
    <div class="options" role="group" aria-label="Options">
      <button id="btn-alternate" class="opt" aria-pressed="false" title="Alterner automatiquement le joueur à chaque gage">🔁 on alterne</button>
      <button id="btn-hidden" class="opt" aria-pressed="false" title="Masquer le temps restant">🙈 temps caché</button>
      <button id="btn-sound" class="opt" aria-pressed="true" title="Activer ou couper le son">🔊 son</button>
    </div>

    <!-- Catégories -->
    <div id="keywords" class="keywords" role="group" aria-label="Filtres"></div>

    <!-- Intensité -->
    <div class="intensity-block">
      <div class="slider-row">
        <span class="slider-label">Intensité</span>
        <input type="range" id="intensity" min="1" max="10" step="1" value="7" aria-label="Intensité du gage (1 à 10)">
        <b id="intensity-val">7</b>
      </div>
      <button id="btn-go" title="Tirer un gage à cette intensité">GO</button>
    </div>

    <p id="note" role="status" aria-live="polite"></p>
    <p id="error" role="alert"></p>

    <!-- Gage tiré -->
    <div id="result">
      <span class="badge" id="badge"></span>
      <div id="item" role="button" tabindex="0" aria-live="polite" aria-label="Gage — appuyer pour afficher en plein écran"></div>
      <button id="btn-speak" title="Lire le gage à voix haute">🔈 Lire le gage</button>
      <div class="timer-row">
        <div class="ring-wrap" id="ring-wrap">
          <svg viewBox="0 0 220 220" aria-hidden="true">
            <circle class="ring-bg" cx="110" cy="110" r="95"/>
            <circle class="ring-fg" id="ring" cx="110" cy="110" r="95"/>
          </svg>
          <div id="countdown"></div>
        </div>
        <div class="timer-btns">
          <button id="btn-pause" title="Pause / reprendre" aria-label="Pause ou reprendre le minuteur">⏸</button>
          <button id="btn-plus" title="Ajouter une minute" aria-label="Ajouter une minute">+ 1 min</button>
        </div>
      </div>
      <div class="action-row">
        <button id="btn-skip" title="Tirer un autre gage à la place">🔀 Passer</button>
        <button id="btn-finish" title="Le gage est fait — arrêter le minuteur">Terminé ✔</button>
      </div>
      <div id="status" role="status" aria-live="polite"></div>
    </div>

    <!-- Score -->
    <div id="score-row">
      <span class="score-label">Score :</span>
      <span class="score-man">Lui <b id="score-homme">0</b></span>
      <span class="score-sep">—</span>
      <span class="score-woman">Elle <b id="score-femme">0</b></span>
      <button id="btn-reset-score" title="Remettre le score à zéro">↺</button>
    </div>

    <div id="total-gages" aria-live="polite"></div>
  </div>
  <div id="zoom" role="button" tabindex="-1" aria-label="Gage en plein écran — appuyer ou Échap pour réduire" title="Réduire"></div>

<script src="app.js"></script>
</body>
</html>
